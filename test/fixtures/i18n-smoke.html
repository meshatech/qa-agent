<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>テストダッシュボード</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .menu { border: 1px solid #ccc; padding: 1rem; display: none; }
    .menu.open { display: block; }
    button { margin: 0.5rem; padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>テストダッシュボード</h1>
  <p id="status">ログイン済み</p>

  <button id="btn-menu" aria-label="メニューを開く" onclick="document.getElementById('menu').classList.toggle('open')">
    メニュー
  </button>

  <div id="menu" class="menu">
    <button id="btn-theme" aria-label="外観モードを切り替える">外観モード</button>
    <button id="btn-logout" aria-label="ログアウトする">ログアウト</button>
  </div>

  <script>
    document.getElementById('btn-theme').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      document.getElementById('status').textContent = document.body.classList.contains('dark') ? 'ダークモード' : 'ライトモード';
    });
    document.getElementById('btn-logout').addEventListener('click', () => {
      document.body.innerHTML = '<h1>ログイン</h1><input type="email" placeholder="メール"><input type="password" placeholder="パスワード"><button>ログイン</button>';
      history.pushState({}, '', '/login');
    });
  </script>
</body>
</html>
