name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck, lint, test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run check

  docker-smoke:
    name: release image smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: docker build -t qa-agent:ci .
      - name: qa-agent --version
        run: docker run --rm qa-agent:ci qa-agent --version
      - name: pipeline help
        run: docker run --rm qa-agent:ci qa-agent pipeline --help
      - name: validate-config (fixture, fake LLM)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/configs:/configs:ro" \
            -e GROQ_PROVIDER=fake \
            qa-agent:ci \
            qa-agent validate-config --config /configs/agent-qa.fixture.config.json
