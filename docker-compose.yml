services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-qa-memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent_qa
      POSTGRES_PASSWORD: agent_qa
      POSTGRES_DB: agent_qa_memory
    ports:
      - '5433:5432'
    volumes:
      - agent-qa-memory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agent_qa -d agent_qa_memory']
      interval: 5s
      timeout: 5s
      retries: 5

  qa-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-qa-runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      QA_AGENT_DAEMON: '1'
      QA_AGENT_DAEMON_PORT: '3000'
      # Container → Chromium precisa de --no-sandbox (rodando como root)
      QA_AGENT_CONTAINER: '1'
      # Dentro da rede do compose o Postgres é alcançável pelo nome do serviço
      # (porta interna 5432, não o mapeamento 5433 do host). Definido aqui para
      # vencer qualquer DATABASE_URL do .env montado — dotenv não sobrescreve env.
      DATABASE_URL: postgresql://agent_qa:agent_qa@postgres:5432/agent_qa_memory
      # Demais variáveis (chaves de LLM etc.) vêm do .env montado via volume abaixo.
    volumes:
      # Configs e runs persistem no host
      - ./configs:/app/configs:ro
      - ./qa-agent-runs:/app/qa-agent-runs
      - ./.agent-qa:/app/.agent-qa
      # Reutiliza .env do host
      - ./.env:/app/.env:ro
    ports:
      - '3000:3000'
    # host.docker.internal não vem habilitado no Docker Engine Linux por padrão
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # Modo API: fica rodando escutando na porta 3000
    # Modo CLI: override o CMD no runtime
    #   docker compose run --rm qa-agent run --config configs/xxx.json
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/qa-agent"]
    command: ["--daemon"]

volumes:
  agent-qa-memory-postgres-data:
